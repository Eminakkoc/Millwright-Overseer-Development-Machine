$schema: "http://json-schema.org/draft-07/schema#"
$id: millwright-overseer-development-machine/primer.schema.yaml
title: workflow-stream/<feature>/blueprints/current/primer.md frontmatter
description: >
  Stage-3 launch primer. Derived snapshot composed from requirements.md,
  config.md, summary.md (active feature section), and progress.md
  (branch + base-commit). Written by mo-plan-implementation immediately
  before the brainstorming chain is invoked, refreshed by mo-update-blueprint
  whenever blueprints/current/ is regenerated. Rotated to history with the
  rest of current/ at stage 8 or on /mo-update-blueprint, so historical
  primers remain auditable.

type: object
additionalProperties: false
required:
  - id
  - requirements-id
  - feature

properties:
  id:
    type: string
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
  requirements-id:
    type: string
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
    description: UUID of the requirements.md this primer summarizes. Refresh in lockstep.
  feature:
    type: string
    pattern: "^[a-z0-9][a-z0-9-]*$"
    description: Kebab-case feature name; mirrors progress.md `active.feature`.
