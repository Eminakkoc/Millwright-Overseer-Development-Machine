$schema: "http://json-schema.org/draft-07/schema#"
$id: millwright-overseer-development-machine/summary.schema.yaml
title: quest/<active-slug>/summary.md frontmatter

type: object
additionalProperties: false
required:
  - id
  - todo-list-id
  - features
  - keywords
  - description

properties:
  id:
    type: string
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
  todo-list-id:
    type: string
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
  features:
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^[a-z0-9][a-z0-9-]*$"
    description: >
      Kebab-case feature names that this summary indexes via `## Feature: <name>` body
      sections. Same set as todo-list.md's `related-features`. Downstream stages read
      only the active feature's section plus `## Cross-cutting constraints`.
  keywords:
    type: array
    items:
      type: string
      minLength: 1
  description:
    type: string
    minLength: 1
