$schema: "http://json-schema.org/draft-07/schema#"
$id: millwright-overseer-development-machine/requirements.schema.yaml
title: workflow-stream/<feature>/blueprints/current/requirements.md frontmatter

type: object
additionalProperties: false
required:
  - id
  - todo-list-id
  - todo-item-ids
  - commits

properties:
  id:
    type: string
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
  todo-list-id:
    type: string
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
  todo-item-ids:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
    description: IDs of the PENDING todo items this requirements document covers.
  commits:
    type: array
    description: Populated by mo-complete-workflow at stage 8.
    items:
      type: object
      required: [sha, msg]
      additionalProperties: false
      properties:
        sha:
          type: string
          pattern: "^[0-9a-f]{7,40}$"
        msg:
          type: string
          minLength: 1
