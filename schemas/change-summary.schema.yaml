$schema: "http://json-schema.org/draft-07/schema#"
$id: millwright-overseer-development-machine/change-summary.schema.yaml
title: workflow-stream/<feature>/implementation/change-summary.md frontmatter
description: >
  Cached analysis of the commit range base-commit..HEAD for an active feature.
  Written once per range and shared by mo-generate-implementation-diagrams and
  /mo-update-blueprint. The (base-commit, head) pair is the cache key —
  `commits.sh change-summary-fresh` compares it against the live progress.md
  base-commit and current HEAD before allowing reuse. Cleaned up by
  /mo-complete-workflow and /mo-abort-workflow alongside the rest of
  implementation/.

type: object
additionalProperties: false
required:
  - id
  - requirements-id
  - feature
  - base-commit
  - head

properties:
  id:
    type: string
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
  requirements-id:
    type: string
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
    description: UUID of the requirements.md this analysis was framed against. Re-pointed by review.sh sync-refs after a mid-cycle blueprint rotation.
  feature:
    type: string
    pattern: "^[a-z0-9][a-z0-9-]*$"
  base-commit:
    type: string
    pattern: "^[0-9a-f]{7,40}$"
    description: The base commit at the time the summary was written. Compared against progress.md `active.base-commit` for cache validation.
  head:
    type: string
    pattern: "^[0-9a-f]{7,40}$"
    description: HEAD at the time the summary was written. Compared against `git rev-parse HEAD` for cache validation. Stale when the chain or review loop adds new commits.
