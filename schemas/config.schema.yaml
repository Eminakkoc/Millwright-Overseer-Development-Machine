$schema: "http://json-schema.org/draft-07/schema#"
$id: millwright-overseer-development-machine/config.schema.yaml
title: workflow-stream/<feature>/blueprints/current/config.md frontmatter

type: object
additionalProperties: false
required:
  - id
  - requirements-id

properties:
  id:
    type: string
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
  requirements-id:
    type: string
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
