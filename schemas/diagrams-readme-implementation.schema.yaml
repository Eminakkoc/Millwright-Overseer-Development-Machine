$schema: "http://json-schema.org/draft-07/schema#"
$id: millwright-overseer-development-machine/diagrams-readme-implementation.schema.yaml
title: workflow-stream/<feature>/implementation/diagrams/README.md frontmatter
description: >
  Implementation diagrams index. Describes the implementation commit range
  base-commit..HEAD that mo-generate-implementation-diagrams just rendered.

  Intentionally does NOT carry `requirements-id` — implementation/change-summary.md
  and the review artifacts (overseer-review.md, review-context.md) carry the
  requirements back-reference. Adding requirements-id here would duplicate state
  without a corresponding generator change.

  UUID pattern accepts any RFC 4122 version (v1-v8) with a valid variant
  nibble — same permissive policy as the blueprint diagrams README schema.

type: object
additionalProperties: false
required:
  - id
  - stage

properties:
  id:
    type: string
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"

  stage:
    type: string
    enum:
      - implementation
