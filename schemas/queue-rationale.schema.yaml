$schema: "http://json-schema.org/draft-07/schema#"
$id: millwright-overseer-development-machine/queue-rationale.schema.yaml
title: quest/<active-slug>/queue-rationale.md frontmatter
description: >
  Audit artifact for the stage-1.5 dependency-ordering decision. Lives at
  millwright-overseer/quest/<active-slug>/queue-rationale.md, co-located
  with the cycle's todo-list.md, summary.md, and progress.md inside the
  per-cycle subfolder. Written by the Pre-flight Handler in /mo-continue
  (Step 2B) just before progress.sh reorder so the prioritized order and
  the reasoning behind it survive a session break. Persists permanently
  under the cycle's slug subfolder once the cycle ends — the historical
  rationale is preserved as part of the task archive rather than scrubbed
  by the next /mo-run.

type: object
additionalProperties: false
required:
  - id
  - todo-list-id
  - features

properties:
  id:
    type: string
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
  todo-list-id:
    type: string
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
  features:
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^[a-z0-9][a-z0-9-]*$"
    description: >
      Cumulative ordered feature list across all confirmed batches (and the
      proposed order for the latest batch when status: draft). The dispatcher's
      Row A (Item 5 of the v11 progress-gap plan) requires `features -
      progress.completed` to equal `progress.queue` in order; Step 2B keeps
      these aligned by refreshing `features` whenever the latest batch flips
      from `draft` to `confirmed`. Step 2A appending a new batch must publish
      the cumulative `features` and `batch: N+1`/`status: draft` in the same
      write so the next /mo-continue routes to the draft-confirmation row.
  status:
    type: string
    enum:
      - draft
      - confirmed
    description: >
      Status of the LATEST batch only (older batches' statuses live in the body
      audit trail). Optional — missing means "confirmed" (back-compat with v10-
      and-earlier files that pre-date the multi-batch addition). The pre-flight
      dispatcher reads this to decide between Row A (auto-apply on confirmed)
      and the draft-confirmation row (route to Step 2B for confirmation).
  batch:
    type: integer
    minimum: 1
    description: >
      Latest batch number. Optional — missing means 1 (back-compat). Step 2A
      appends `## Batch <N+1>` and writes `batch: N+1` in the same operation;
      Step 2B refreshes this when flipping `status: draft → confirmed`.
