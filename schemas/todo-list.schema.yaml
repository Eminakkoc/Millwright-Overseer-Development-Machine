$schema: "http://json-schema.org/draft-07/schema#"
$id: millwright-overseer-development-machine/todo-list.schema.yaml
title: quest/<active-slug>/todo-list.md frontmatter
description: Feature-queue todo items; frontmatter carries top-level metadata, body carries the items themselves.

type: object
additionalProperties: false
required:
  - id
  - related-features
  - description

properties:
  id:
    type: string
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
    description: UUID v4.
  related-features:
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^[a-z0-9][a-z0-9-]*$"
    description: Feature/module names (existing or to-be-implemented).
  description:
    type: string
    minLength: 1
